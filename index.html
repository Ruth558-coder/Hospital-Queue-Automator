<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Queue Dashboard - Kakamega County Referral Hospital</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Header Section -->
    <header class="hospital-header bg-success text-white py-3">
        <div class="container-fluid">
            <div class="row align-items-center">
                <div class="col-md-6">
                    <h1 class="h3 mb-0">
                        <i class="bi bi-hospital me-2"></i>
                        Kakamega County Referral Hospital
                    </h1>
                    <p class="mb-0 small">Smart Queue Management System</p>
                </div>
                <div class="col-md-6 text-md-end">
                    <div id="datetime" class="h5 mb-0"></div>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Dashboard -->
    <main class="container-fluid py-4">
        <div class="row">
            <!-- Queue Display Section -->
            <div class="col-lg-8">
                <div class="card mb-4">
                    <div class="card-header bg-primary text-white">
                        <h5 class="mb-0">
                            <i class="bi bi-people-fill me-2"></i>
                            Current Queue
                        </h5>
                    </div>
                    <div class="card-body">
                        <!-- Filter Section -->
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <select id="serviceFilter" class="form-select">
                                    <option value="">All Services</option>
                                    <option value="Consultation">Consultation</option>
                                    <option value="Lab">Lab</option>
                                    <option value="Pharmacy">Pharmacy</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <div class="btn-group w-100" role="group">
                                    <button type="button" class="btn btn-outline-secondary filter-btn active" data-filter="all">All</button>
                                    <button type="button" class="btn btn-warning filter-btn" data-filter="waiting">Waiting</button>
                                    <button type="button" class="btn btn-info filter-btn" data-filter="serving">Serving</button>
                                    <button type="button" class="btn btn-success filter-btn" data-filter="done">Done</button>
                                </div>
                            </div>
                        </div>
                        
                        <!-- Queue List -->
                        <div id="queueList" class="row g-3">
                            <!-- Patient cards will be dynamically added here -->
                        </div>
                        
                        <div id="emptyQueue" class="text-center py-5 text-muted">
                            <i class="bi bi-person-x display-1"></i>
                            <p class="mt-3">No patients in queue</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Control Panel -->
            <div class="col-lg-4">
                <!-- Add Patient Form -->
                <div class="card mb-4">
                    <div class="card-header bg-secondary text-white">
                        <h5 class="mb-0">
                            <i class="bi bi-person-plus-fill me-2"></i>
                            Add New Patient
                        </h5>
                    </div>
                    <div class="card-body">
                        <form id="addPatientForm">
                            <div class="mb-3">
                                <label for="patientName" class="form-label">Patient Name</label>
                                <input type="text" class="form-control" id="patientName" required>
                                <div class="invalid-feedback">Please enter patient name</div>
                            </div>
                            <div class="mb-3">
                                <label for="serviceType" class="form-label">Service Type</label>
                                <select class="form-select" id="serviceType" required>
                                    <option value="">Select Service</option>
                                    <option value="Consultation">Consultation</option>
                                    <option value="Lab">Lab</option>
                                    <option value="Pharmacy">Pharmacy</option>
                                </select>
                                <div class="invalid-feedback">Please select a service type</div>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">
                                <i class="bi bi-plus-circle me-2"></i>
                                Add to Queue
                            </button>
                        </form>
                    </div>
                </div>

                <!-- Queue Statistics -->
                <div class="card mb-4">
                    <div class="card-header bg-info text-white">
                        <h5 class="mb-0">
                            <i class="bi bi-graph-up me-2"></i>
                            Queue Statistics
                        </h5>
                    </div>
                    <div class="card-body">
                        <div class="row text-center">
                            <div class="col-4">
                                <div class="stat-box">
                                    <div class="stat-number text-warning" id="waitingCount">0</div>
                                    <div class="stat-label">Waiting</div>
                                </div>
                            </div>
                            <div class="col-4">
                                <div class="stat-box">
                                    <div class="stat-number text-info" id="servingCount">0</div>
                                    <div class="stat-label">Serving</div>
                                </div>
                            </div>
                            <div class="col-4">
                                <div class="stat-box">
                                    <div class="stat-number text-success" id="doneCount">0</div>
                                    <div class="stat-label">Done</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Quick Actions -->
                <div class="card">
                    <div class="card-header bg-warning text-dark">
                        <h5 class="mb-0">
                            <i class="bi bi-lightning-fill me-2"></i>
                            Quick Actions
                        </h5>
                    </div>
                    <div class="card-body">
                        <div class="d-grid gap-2">
                            <button id="autoAdvance" class="btn btn-outline-primary">
                                <i class="bi bi-arrow-clockwise me-2"></i>
                                Auto-Advance Queue
                            </button>
                            <button id="clearDone" class="btn btn-outline-danger">
                                <i class="bi bi-trash me-2"></i>
                                Clear Completed
                            </button>
                            <button id="exportData" class="btn btn-outline-success">
                                <i class="bi bi-download me-2"></i>
                                Export Queue Data
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="script.js"></script>
</body>
</html>
